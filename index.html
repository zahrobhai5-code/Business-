<!DOCTYPE html>
<html>
<head>
<title>Business App Pro</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
margin:0;
padding:0;
}

.container{
max-width:420px;
margin:auto;
margin-top:40px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4facfe;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

button:hover{
background:#2f8cff;
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:6px;
margin-top:10px;
}

.dashboard{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.card{
background:#f3f3f3;
padding:10px;
border-radius:8px;
text-align:center;
flex:1;
margin:5px;
}

.total{
font-size:20px;
color:#4facfe;
}

</style>

</head>

<body>

<div class="container">

<h2>Business App</h2>

<button onclick="login()">Login With Google</button>

<input id="name" placeholder="Customer Name">

<input id="product" placeholder="Product">

<input id="price" placeholder="Price">

<button onclick="saveData()">Save Sale</button>

<div class="dashboard">

<div class="card">
Today Sales
<div class="total" id="today">0</div>
</div>

<div class="card">
Total Sales
<div class="total" id="total">0</div>
</div>

</div>

</div>

<script>

let accessToken=""
let sheetId=""
let todayTotal=0
let allTotal=0

function login(){

const client=google.accounts.oauth2.initTokenClient({

client_id:"657689658729-ums22ru0etqvaor59489vcrgd0rvph5a.apps.googleusercontent.com",

scope:"https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets",

callback:(response)=>{

accessToken=response.access_token

createSheet()

}

})

client.requestAccessToken()

}

async function createSheet(){

let res=await fetch(
"https://sheets.googleapis.com/v4/spreadsheets",
{
method:"POST",
headers:{
Authorization:"Bearer "+accessToken,
"Content-Type":"application/json"
},
body:JSON.stringify({
properties:{title:"Business App Data"},
sheets:[{properties:{title:"Sales"}}]
})
}
)

let data=await res.json()

sheetId=data.spreadsheetId

alert("Google Sheet Created")

}

async function saveData(){

let name=document.getElementById("name").value
let product=document.getElementById("product").value
let price=document.getElementById("price").value

let date=new Date().toLocaleDateString()

todayTotal+=Number(price)
allTotal+=Number(price)

document.getElementById("today").innerText=todayTotal
document.getElementById("total").innerText=allTotal

await fetch(
`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Sales!A1:append?valueInputOption=RAW`,
{
method:"POST",
headers:{
Authorization:"Bearer "+accessToken,
"Content-Type":"application/json"
},
body:JSON.stringify({
values:[[date,name,product,price]]
})
}
)

alert("Sale Saved")

}

</script>

</body>
</html>
