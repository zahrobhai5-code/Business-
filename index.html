<!DOCTYPE html>
<html>
<head>

<title>Universal Manager App</title>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#2c3e50;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.mode-btn{
width:100%;
padding:14px;
margin:8px 0;
border:none;
border-radius:8px;
font-size:16px;
background:#3498db;
color:white;
cursor:pointer;
}

.mode-btn:hover{
background:#2980b9;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-top:15px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:6px;
}

.save-btn{
background:#27ae60;
margin-top:10px;
}

.dashboard{
display:flex;
gap:10px;
}

.dashboard .card{
flex:1;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
Universal Manager App
</div>

<div class="container">

<button class="mode-btn" onclick="login()">Login With Google</button>

<div id="modeSelect">

<h3>Select Mode</h3>

<button class="mode-btn" onclick="openMode()">Start Business</button>

</div>

<div id="appArea"></div>

<div class="card">

<h3>Dashboard</h3>

<div class="dashboard">

<div class="card">
<h4>Today Sales</h4>
<div id="todaySales">0</div>
</div>

<div class="card">
<h4>Total Records</h4>
<div id="totalRecords">0</div>
</div>

</div>

</div>

<div class="card">

<h3>Monthly Profit</h3>

<div id="monthlyProfit">0</div>

</div>

<div class="card">

<h3>Sales Graph</h3>

<canvas id="salesChart"></canvas>

</div>

<div class="card">

<h3>Stock Management</h3>

<input id="stockName" placeholder="Product Name">
<input id="stockQty" placeholder="Quantity">

<button class="mode-btn save-btn" onclick="addStock()">Add Stock</button>

<ul id="stockList"></ul>

</div>

<div class="card">

<h3>Customer History</h3>

<ul id="customerList"></ul>

</div>

<div class="card">

<h3>Invoice</h3>

<div id="invoiceArea"></div>

<button class="mode-btn save-btn" onclick="sendWhatsApp()">Send WhatsApp Invoice</button>

</div>

</div>

<script>

let accessToken=""
let sheetId=""

let totalRecords=0
let todaySales=0
let monthlyProfit=0

let salesData=[0,0,0,0,0,0,0]

let customers=[]
let stocks=[]

let lastInvoice=""

function login(){

const client=google.accounts.oauth2.initTokenClient({

client_id:"657689658729-ums22ru0etqvaor59489vcrgd0rvph5a.apps.googleusercontent.com",

scope:"https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/spreadsheets",

callback:(response)=>{

accessToken=response.access_token
createSheet()

}

})

client.requestAccessToken()

}

async function createSheet(){

let res=await fetch(
"https://sheets.googleapis.com/v4/spreadsheets",
{
method:"POST",
headers:{
Authorization:"Bearer "+accessToken,
"Content-Type":"application/json"
},
body:JSON.stringify({
properties:{title:"Universal Manager Data"},
sheets:[{properties:{title:"Records"}}]
})
}
)

let data=await res.json()
sheetId=data.spreadsheetId

alert("Database Ready")

}

function openMode(){

let html=`
<div class="card">
<h3>Sale Entry</h3>
<input id="f1" placeholder="Customer Name">
<input id="f2" placeholder="Product">
<input id="f3" placeholder="Price">
<button class="mode-btn save-btn" onclick="saveData()">Save Sale</button>
</div>`

document.getElementById("modeSelect").style.display="none"
document.getElementById("appArea").innerHTML=html

}

async function saveData(){

let a=document.getElementById("f1").value
let b=document.getElementById("f2").value
let c=parseFloat(document.getElementById("f3").value)

let date=new Date().toLocaleDateString()

await fetch(
`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/Records!A1:append?valueInputOption=RAW`,
{
method:"POST",
headers:{
Authorization:"Bearer "+accessToken,
"Content-Type":"application/json"
},
body:JSON.stringify({
values:[[date,a,b,c]]
})
}
)

customers.push(a+" - "+b+" - "+c)

let li=document.createElement("li")
li.innerText=a+" - "+b+" - "+c
document.getElementById("customerList").appendChild(li)

totalRecords++
todaySales++
monthlyProfit+=c

document.getElementById("todaySales").innerText=todaySales
document.getElementById("totalRecords").innerText=totalRecords
document.getElementById("monthlyProfit").innerText=monthlyProfit

salesData[0]+=1
chart.update()

lastInvoice=`Customer: ${a}\nProduct: ${b}\nPrice: ${c}`

document.getElementById("invoiceArea").innerHTML=
"Customer: "+a+"<br>Product: "+b+"<br>Price: "+c

alert("Sale Saved")

}

function addStock(){

let name=document.getElementById("stockName").value
let qty=document.getElementById("stockQty").value

let li=document.createElement("li")
li.innerText=name+" ("+qty+")"

document.getElementById("stockList").appendChild(li)

}

function sendWhatsApp(){

let url="https://wa.me/?text="+encodeURIComponent(lastInvoice)

window.open(url,"_blank")

}

const ctx=document.getElementById('salesChart').getContext('2d')

const chart=new Chart(ctx,{
type:'bar',
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
label:"Sales",
data:salesData,
backgroundColor:"#3498db"
}]
}
})

</script>

</body>
</html>
